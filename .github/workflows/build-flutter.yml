name: Build Flutter APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'

      - name: Unzip Source
        run: unzip source.zip -d ./project || true
        
      - name: Find Project
        id: find_dir
        run: echo "DIR=$(find . -name pubspec.yaml -exec dirname {} \; | head -1)" >> $GITHUB_OUTPUT
        
      - name: Get Dependencies
        working-directory: ${{ steps.find_dir.outputs.DIR }}
        run: flutter pub get

      - name: Build APK
        working-directory: ${{ steps.find_dir.outputs.DIR }}
        run: flutter build apk --release --target-platform android-arm64

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-release
          path: ${{ steps.find_dir.outputs.DIR }}/build/app/outputs/flutter-apk/*.apk
          retention-days: 1
